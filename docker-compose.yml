version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stacksvault
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/stacksvault
      STACKS_NETWORK: testnet
      VAULT_CONTRACT_ADDRESS: ${VAULT_CONTRACT_ADDRESS}
      REMITTANCE_CONTRACT_ADDRESS: ${REMITTANCE_CONTRACT_ADDRESS}
    depends_on:
      - db
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_STACKS_NETWORK: testnet
      NEXT_PUBLIC_REMITTANCE_CONTRACT: ${NEXT_PUBLIC_REMITTANCE_CONTRACT}
      NEXT_PUBLIC_VAULT_CONTRACT: ${NEXT_PUBLIC_VAULT_CONTRACT}
    depends_on:
      - backend

volumes:
  pgdata:
